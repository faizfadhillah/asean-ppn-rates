name: Update ASEAN PPN Rates

on:
  schedule:
    # Runs on the 1st and 15th of every month at 06:00 UTC
    - cron: '0 6 1,15 * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check rates against PwC
        id: check
        run: |
          python3 scripts/check_rates.py --update 2>&1 | tee check_output.txt
          # Script exits 1 if changes detected, 0 if no changes
          if [ ${PIPESTATUS[0]} -eq 1 ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/asean-ppn-rates.json
          git commit -m "chore: auto-update ASEAN PPN rates $(date +%Y-%m-%d)

          Changes detected by automated PwC Tax Summaries check.
          See check_output.txt in workflow run for details."
          git push

      - name: Create issue if rates changed
        if: steps.check.outputs.changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('check_output.txt', 'utf8');
            const changes = output.split('\n').filter(l => l.includes('CHANGED')).join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔔 PPN Rate Change Detected — ${new Date().toISOString().split('T')[0]}`,
              body: `## Automated Rate Check\n\nThe following rate changes were detected and auto-committed:\n\n\`\`\`\n${changes}\n\`\`\`\n\n### Full Output\n\`\`\`\n${output}\n\`\`\`\n\n> Please verify these changes against official government sources before relying on them.`,
              labels: ['rate-change', 'auto-update']
            });

      - name: Summary
        run: cat check_output.txt
